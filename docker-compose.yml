name: morpheus

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-morpheus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morpheus}
      POSTGRES_DB: ${POSTGRES_DB:-morpheus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - morpheus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-morpheus} -d ${POSTGRES_DB:-morpheus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      # Host/porta fixos em "postgres:5432" (nome do serviço na rede interna do
      # Compose) — nunca vêm de ${DATABASE_URL}, porque o .env da raiz (usado
      # pelo `pnpm dev` local) também é lido pelo Compose para interpolação e
      # tem "localhost", o que quebraria a resolução de nome dentro da rede
      # Docker. Só usuário/senha/banco são compartilháveis entre os dois
      # contextos.
      DATABASE_URL: postgresql://${POSTGRES_USER:-morpheus}:${POSTGRES_PASSWORD:-morpheus}@postgres:5432/${POSTGRES_DB:-morpheus}?schema=public
    # O binário do prisma fica em packages/database/node_modules/.bin (é
    # devDependency do pacote @morpheus/database, não da raiz do workspace).
    # --config aponta explicitamente para o prisma.config.ts do pacote,
    # necessário porque o WORKDIR (/app, raiz do monorepo) não é o mesmo
    # diretório onde o Prisma CLI procura o arquivo de config por padrão.
    command:
      [
        "packages/database/node_modules/.bin/prisma",
        "migrate",
        "deploy",
        "--schema",
        "packages/database/prisma/schema.prisma",
        "--config",
        "packages/database/prisma.config.ts",
      ]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Host/porta fixos em "postgres:5432" (nome do serviço na rede interna do
      # Compose) — nunca vêm de ${DATABASE_URL}, porque o .env da raiz (usado
      # pelo `pnpm dev` local) também é lido pelo Compose para interpolação e
      # tem "localhost", o que quebraria a resolução de nome dentro da rede
      # Docker. Só usuário/senha/banco são compartilháveis entre os dois
      # contextos.
      DATABASE_URL: postgresql://${POSTGRES_USER:-morpheus}:${POSTGRES_PASSWORD:-morpheus}@postgres:5432/${POSTGRES_DB:-morpheus}?schema=public
      # Link de verificação codificado no QR Code do parecer (Etapa 7) —
      # precisa ser o domínio público real em produção, não "localhost".
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      STORAGE_DIR: /app/storage
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      # Pareceres em PDF persistem entre reinicializações/deploys do container
      # (disco efêmero por padrão) — mesmo raciocínio do volume do Postgres.
      # Ponto de troca natural para um adapter S3 quando migrar pra nuvem
      # (Etapa 16): a variável STORAGE_DIR some, e só a implementação do
      # adapter muda.
      - morpheus_storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API_URL (sem prefixo NEXT_PUBLIC_) é o que a rota de proxy server-only usa
  # (src/app/api/health/route.ts) — de propósito sem o prefixo, porque o
  # Next.js faz inline de qualquer NEXT_PUBLIC_* em tempo de build, mesmo em
  # código server-only; um valor prefixado ficaria congelado com o padrão do
  # build e nunca refletiria o hostname interno do Compose.
  # `args.NEXT_PUBLIC_API_URL` (build-time) existe para o dia em que algum
  # componente cliente precisar chamar a API diretamente do browser — aí sim
  # o valor precisa ser público/externo, e faz sentido vir do .env.
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      # Fixo (não interpolado do .env) pelo mesmo motivo do DATABASE_URL acima:
      # é o hostname do serviço "api" na rede interna do Compose, não o
      # endereço público usado pelo browser.
      API_URL: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  morpheus_postgres_data:
  morpheus_storage_data:
